# CheapShot — Fully self-hosted
#
# Ollama runs natively on the host (GPU access).
# App and SearXNG run in Docker.
#
# Quick start:
#   1. Install Ollama natively: ollama.com/download
#   2. ollama pull qwen2.5:14b
#   3. docker compose up -d
#   4. Open http://localhost:3000

services:
  app:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      - DB_PATH=/app/data/cheapshot.db
      - OLLAMA_URL=http://host.docker.internal:11434
      - SEARXNG_URL=http://searxng:8080
    volumes:
      - ./data:/app/data
    depends_on:
      - searxng
    restart: unless-stopped

  searxng:
    image: searxng/searxng:latest
    ports:
      - "8080:8080"
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080/
    restart: unless-stopped
