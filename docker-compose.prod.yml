# Production — runs on the Pi cluster (cheapshot-app node)
# Ollama runs on separate nodes, accessed via the Nginx LB.
#
# Deploy: docker compose -f docker-compose.prod.yml up -d

services:
  app:
    image: ghcr.io/sysmwix/cheapshot:latest
    ports:
      - "3000:3000"
    environment:
      - DB_PATH=/app/data/cheapshot.db
    env_file:
      - .env.local
    volumes:
      - /opt/cheapshot/data:/app/data
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
