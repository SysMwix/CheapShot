use_default_settings: true

server:
  secret_key: "cheapshot-searxng-local-dev"
  bind_address: "0.0.0.0"
  port: 8080

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "en-GB"
  formats:
    - html
    - json

  # Block non-shopping domains at the search engine level
  # so they don't waste result slots
  banned_domains:
    # Social media
    - zhihu.com
    - baidu.com
    - quora.com
    - reddit.com
    - facebook.com
    - twitter.com
    - x.com
    - instagram.com
    - youtube.com
    - tiktok.com
    - pinterest.com
    - linkedin.com
    # Reference / editorial
    - wikipedia.org
    - wikihow.com
    - trustpilot.com
    - reviewcentre.com
    # Car listing sites (not parts shops)
    - autotrader.co.uk
    - motors.co.uk
    - clickmechanic.com
    - parkers.co.uk
    - carwow.co.uk
    # Google Shopping (too noisy)
    - google.com/shopping

engines:
  - name: google
    engine: google
    shortcut: g
    disabled: false
  - name: bing
    engine: bing
    shortcut: b
    disabled: false
  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    disabled: false
